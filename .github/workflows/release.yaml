---
name: Release

on:
  push:
    tags:
      - "v[0-9]*"
      - "v[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "${PREV_TAG}" ]; then
            CHANGELOG=$(git log --oneline)
          else
            CHANGELOG=$(git log --oneline "${PREV_TAG}..${CURRENT_TAG}")
          fi
          {
            echo "BODY<<EOF"
            echo "## Changes"
            echo ""
            echo "${CHANGELOG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: helm package helm/ -d dist/

      - name: Create GitHub Release
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.BODY }}
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          gh release create "${CURRENT_TAG}" dist/*.tgz \
            --title "${CURRENT_TAG}" \
            --notes "${RELEASE_BODY}"
