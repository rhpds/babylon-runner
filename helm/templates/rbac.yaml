{{/* babylon-runner/helm/templates/rolebinding.yaml */}}
{{- if .Values.deploy }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "babylon-runner.fullname" . }}
  namespace: {{ include "babylon-runner.namespaceName" . }}
  labels:
    {{- include "babylon-runner.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "babylon-runner.fullname" . }}
  namespace: {{ include "babylon-runner.namespaceName" . }}
  labels:
    {{- include "babylon-runner.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "babylon-runner.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "babylon-runner.fullname" . }}
  namespace: {{ include "babylon-runner.namespaceName" . }}
{{- end }}
